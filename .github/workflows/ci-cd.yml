name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    check_for_code_changes:
        name: Check for Code Changes
        runs-on: ubuntu-latest
        outputs:
            has_code_changes: ${{ steps.filter.outputs.src }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0 # Required for accurate change detection

            - name: Detect changes
              uses: dorny/paths-filter@v4
              id: filter
              with:
                  # Base branch to compare against.
                  # For PRs, this is the base branch. For pushes, it's the previous commit.
                  # This option is ignored if action is triggered by pull_request event.
                  base: ${{ github.event_name == 'push' && github.event.before || '' }}
                  # List of paths to ignore (e.g., documentation, CI/CD workflows)
                  filters: |
                      src:
                        - '!**/*.md'
                        - '!.gitignore'
                        - '!LICENSE'
                        - '!.github/**'
                  predicate-quantifier: 'every'

    test:
        name: Test & Lint
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x, 22.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v7
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check vendored PouchDB freshness
              run: npm run check:pouchdb

            - name: Run linting
              run: npm run lint

            - name: Check code formatting
              run: npm run format:check

            - name: Check generated Tailwind CSS is up to date
              run: npm run check:css

            - name: Check vendored Font Awesome is up to date
              run: npm run check:fontawesome

            - name: Run tests
              run: npm run test:coverage

            - name: Upload coverage reports
              if: matrix.node-version == '22.x'
              uses: codecov/codecov-action@v7
              with:
                  files: ./coverage/lcov.info
                  flags: unittests
                  name: codecov-umbrella
                  fail_ci_if_error: false

    python-tests:
        name: Python Unit & Guard Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: '22.x'
                  cache: 'npm'

            - name: Setup Python
              uses: actions/setup-python@v7
              with:
                  python-version: '3.12'

            - name: Install uv
              run: python -m pip install uv==0.11.21

            - name: Install locked Python dependencies
              run: uv sync --locked

            - name: Install npm dependencies
              # Generated-file guards invoke the repository's Node scripts.
              run: npm ci

            - name: Run Python linting
              run: npm run lint:python

            - name: Run Python unit and guard tests
              run: npm run test:python

    e2e:
        name: E2E Tests (Playwright)
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: '22.x'
                  cache: 'npm'

            - name: Setup Python
              uses: actions/setup-python@v7
              with:
                  python-version: '3.12'

            - name: Install uv
              run: python -m pip install uv==0.11.21

            - name: Install locked Python dependencies
              run: uv sync --locked

            - name: Install Playwright browser
              run: uv run --locked playwright install chromium --with-deps

            - name: Install npm dependencies
              # Full install, not --omit=dev: pouchdb is a devDependency and
              # the E2E suite serves node_modules/pouchdb/dist/pouchdb.min.js
              # instead of loading it from the CDN.
              run: npm ci

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Upload screenshots on failure
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: e2e-screenshots
                  path: test_screenshots/
                  retention-days: 7

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: '20.x'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build application
              run: |
                  # Since this is a static site, we'll just verify the public directory exists
                  # and run any build steps if they exist in the future
                  echo "Verifying build artifacts..."
                  ls -la public/
            - name: Generate CouchDB config (from secret)
              run: |
                  if [ -n "${COUCHDB_URL}" ]; then
                    printf "export const COUCHDB_URL = '%s';\n" "${COUCHDB_URL}" > public/js/config.js
                  fi
              env:
                  COUCHDB_URL: ${{ secrets.COUCHDB_URL }}

            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: build-files
                  path: public/
                  retention-days: 1

    deploy-preview:
        name: Deploy Preview
        runs-on: ubuntu-latest
        needs: [test, python-tests, e2e, build, check_for_code_changes]
        if: github.event_name == 'pull_request' && needs.check_for_code_changes.outputs.has_code_changes == 'true' && github.actor != 'dependabot[bot]'
        permissions:
            contents: read
            pull-requests: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                  name: build-files
                  path: public/

            - name: Configure Firebase service account
              shell: bash
              env:
                  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FORTUDO }}
              run: |
                  printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
                  echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

            - name: Deploy to Firebase Hosting (Preview)
              id: deploy-preview
              shell: bash
              run: |
                  set +e

                  branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
                  slug="$(
                    printf '%s' "$branch" |
                    tr '[:upper:]' '[:lower:]' |
                    sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g' |
                    cut -c1-20
                  )"
                  channel="pr${{ github.event.pull_request.number }}-${slug}"
                  legacy_channel_prefix="${channel}-"
                  log_file="$RUNNER_TEMP/firebase-preview-deploy.log"
                  channel_list_file="$RUNNER_TEMP/firebase-preview-channels.json"
                  cleanup_channels_file="$RUNNER_TEMP/firebase-preview-cleanup-channels.txt"
                  cleanup_cutoff="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

                  export_preview_details() {
                    local source_file="$1"
                    local preview_url
                    preview_url="$(
                      grep -Eo 'https://[^"[:space:]]+' "$source_file" |
                      grep -E 'web\.app|firebaseapp\.com' |
                      sort -u |
                      head -n 1
                    )"
                    local preview_expires
                    preview_expires="$(
                      grep -Eo '"expireTime":[[:space:]]*"[^"]+"' "$source_file" |
                      head -n 1 |
                      sed -E 's/^"expireTime":[[:space:]]*"([^"]+)"$/\1/'
                    )"

                    if [ -n "$preview_url" ]; then
                      echo "Firebase Hosting preview URL: $preview_url"
                      echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
                      if [ -n "$preview_expires" ]; then
                        echo "Firebase Hosting preview expiry: $preview_expires"
                        echo "preview_expires=$preview_expires" >> "$GITHUB_OUTPUT"
                      fi
                    else
                      echo "Firebase Hosting preview URL was not present in $source_file."
                    fi
                  }

                  npx firebase-tools@latest hosting:channel:list \
                    --site fortudo \
                    --project fortudo \
                    --json > "$channel_list_file"
                  list_status=$?

                  if [ "$list_status" -ne 0 ]; then
                    echo "Unable to list Firebase preview channels safely; refusing cleanup."
                    exit "$list_status"
                  fi

                  python3 scripts/firebase_preview_channels.py \
                    "$channel_list_file" \
                    "$legacy_channel_prefix" \
                    "$channel" \
                    "$cleanup_cutoff" > "$cleanup_channels_file"
                  parse_status=$?

                  if [ "$parse_status" -ne 0 ]; then
                    echo "Unable to parse Firebase preview channels safely; refusing cleanup."
                    exit "$parse_status"
                  fi

                  while IFS= read -r cleanup_channel; do
                    if [ -z "$cleanup_channel" ]; then
                      continue
                    fi
                    echo "Deleting obsolete or expired preview channel: $cleanup_channel"
                    npx firebase-tools@latest hosting:channel:delete "$cleanup_channel" \
                      --site fortudo \
                      --force \
                      --project fortudo
                    delete_status=$?
                    if [ "$delete_status" -ne 0 ]; then
                      exit "$delete_status"
                    fi
                  done < "$cleanup_channels_file"

                  npx firebase-tools@latest hosting:channel:deploy "$channel" \
                    --expires 30d \
                    --project fortudo \
                    --json 2>&1 | tee "$log_file"
                  deploy_status=${PIPESTATUS[0]}

                  if [ "$deploy_status" -eq 0 ]; then
                    export_preview_details "$log_file"
                    exit 0
                  fi

                  if grep -q 'already exists' "$log_file"; then
                    echo "Firebase Hosting preview channel exists without a usable release; recreating it."
                    npx firebase-tools@latest hosting:channel:delete "$channel" \
                      --site fortudo \
                      --force \
                      --project fortudo
                    npx firebase-tools@latest hosting:channel:deploy "$channel" \
                      --expires 30d \
                      --project fortudo \
                      --json 2>&1 | tee "$log_file"
                    deploy_status=${PIPESTATUS[0]}

                    if [ "$deploy_status" -eq 0 ]; then
                      export_preview_details "$log_file"
                      exit 0
                    fi
                  fi

                  if grep -q 'is the current active version' "$log_file"; then
                    echo "Firebase Hosting preview channel exists; listing channels for its URL."
                    channel_list_file="$RUNNER_TEMP/firebase-preview-channels.log"
                    npx firebase-tools@latest hosting:channel:list \
                      --project fortudo \
                      --json 2>&1 | tee "$channel_list_file"
                    export_preview_details "$channel_list_file"
                    exit 0
                  fi

                  exit "$deploy_status"
              env:
                  FIREBASE_CLI_EXPERIMENTS: webframeworks

            - name: Comment preview URL on pull request
              if: steps.deploy-preview.outputs.preview_url != ''
              uses: actions/github-script@v9
              env:
                  PREVIEW_URL: ${{ steps.deploy-preview.outputs.preview_url }}
                  PREVIEW_EXPIRES: ${{ steps.deploy-preview.outputs.preview_expires }}
                  DEPLOYED_SHA: ${{ github.event.pull_request.head.sha }}
              with:
                  script: |
                      const marker = '<!-- firebase-hosting-preview -->';
                      const shortSha = process.env.DEPLOYED_SHA.slice(0, 7);
                      const expires = new Date(process.env.PREVIEW_EXPIRES);
                      const expiryLines = Number.isNaN(expires.getTime())
                        ? []
                        : [`(expires ${expires.toUTCString()})`, ''];
                      const body = [
                        marker,
                        `Visit the preview URL for this PR (updated for commit ${shortSha}):`,
                        '',
                        `[${process.env.PREVIEW_URL}](${process.env.PREVIEW_URL})`,
                        '',
                        ...expiryLines,
                      ].join('\n');

                      const issue = {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      };
                      const comments = await github.paginate(
                        github.rest.issues.listComments,
                        issue,
                      );
                      const existing = comments.find(
                        (comment) =>
                          comment.user?.type === 'Bot' && comment.body?.includes(marker),
                      );

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: issue.owner,
                          repo: issue.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({ ...issue, body });
                      }

    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: [test, python-tests, e2e, build, check_for_code_changes]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.check_for_code_changes.outputs.has_code_changes == 'true'

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                  name: build-files
                  path: public/

            - name: Configure Firebase service account
              shell: bash
              env:
                  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FORTUDO }}
              run: |
                  printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
                  echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

            - name: Deploy to Firebase Hosting (Production)
              shell: bash
              run: |
                  set +e

                  log_file="$RUNNER_TEMP/firebase-production-deploy.log"

                  npx firebase-tools@latest deploy \
                    --only hosting \
                    --project fortudo \
                    --json 2>&1 | tee "$log_file"
                  deploy_status=${PIPESTATUS[0]}

                  if [ "$deploy_status" -eq 0 ]; then
                    exit 0
                  fi

                  if grep -q 'is the current active version' "$log_file"; then
                    echo "Firebase Hosting live version is already active; treating retry as successful."
                    exit 0
                  fi

                  exit "$deploy_status"
              env:
                  FIREBASE_CLI_EXPERIMENTS: webframeworks
